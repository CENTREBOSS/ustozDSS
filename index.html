<!doctype html>
<html lang="uz" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speaking Robot</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
        html, body { height: 100%; margin: 0; }
        body { font-family: 'Orbitron', sans-serif; }

        .robot-container {
            position: relative;
            width: 200px;
            height: 280px;
            margin: 0 auto;
        }

        .robot-head {
            width: 120px;
            height: 100px;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border-radius: 20px;
            margin: 0 auto;
            position: relative;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .robot-eye {
            width: 24px;
            height: 24px;
            background: #0f5;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            box-shadow: 0 0 10px #0f5;
            transition: all 0.1s;
        }

        .robot-eye.left { left: 25px; }
        .robot-eye.right { right: 25px; }

        .robot-eye.blink {
            height: 4px;
            top: 40px;
        }

        .robot-mouth {
            width: 40px;
            height: 12px;
            background: #ff0000;
            border-radius: 6px;
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.1s;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
        }

        .robot-mouth.speaking {
            height: 20px;
            border-radius: 10px;
        }

        .robot-body {
            width: 100px;
            height: 120px;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border-radius: 15px;
            margin: 10px auto 0;
            border: 3px solid #0f5;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        .robot-screen {
            width: 60px;
            height: 60px;
            background: #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .robot-screen .wave-bars {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 30px;
        }

        .wave-bar {
            width: 4px;
            background: #0f5;
            border-radius: 2px;
            height: 8px;
            transition: height 0.05s;
        }

        .robot-arm {
            position: absolute;
            width: 20px;
            height: 80px;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border-radius: 10px;
            top: 120px;
            border: 2px solid #0f5;
        }

        .robot-arm.left { left: 15px; transform: rotate(5deg); }
        .robot-arm.right { right: 15px; transform: rotate(-5deg); }

        .speech-bubble {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: #0f5;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-family: sans-serif;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(0,255,0,0.2);
            border: 2px solid #0f5;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .speech-bubble.visible { opacity: 1; }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #0f5;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .robot-container { animation: float 3s ease-in-out infinite; }

        .btn-speak {
            background: linear-gradient(135deg, #0066cc, #0052a3);
            border: none;
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.4);
            border: 2px solid #0066cc;
        }

        .btn-speak:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0, 102, 204, 0.6); }
        .btn-speak:active { transform: scale(0.98); }
        .btn-speak:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .input-text {
            background: #0a0a0a;
            border: 2px solid #0f5;
            color: #0f5;
            padding: 12px 16px;
            border-radius: 10px;
            font-family: sans-serif;
            font-size: 16px;
            width: 100%;
            max-width: 400px;
            transition: border-color 0.2s;
        }

        .input-text:focus { outline: none; border-color: #00ff00; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .input-text::placeholder { color: #0f5; opacity: 0.6; }

        .lesson-btn {
            background: #0f5;
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
            width: 100%;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lesson-btn:hover { background: #00ff00; box-shadow: 0 0 8px rgba(0,255,0,0.5); }
        .lesson-btn.active { background: #ff0000; color: white; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full w-full bg-black flex flex-col items-center justify-start overflow-auto">
  <div class="text-center p-6 w-full">
   <h1 id="page-title" class="text-3xl font-bold text-red-500 mb-2">🤖 Darslik Robot</h1>
   <p id="header-text" class="text-blue-400 mb-6 text-sm">Darsliklarni o'qing va robot gapirib beradi</p>
   <div class="robot-container mb-8">
    <div class="speech-bubble" id="speech-bubble"></div>
    <div class="robot-arm left"></div>
    <div class="robot-arm right"></div>
    <div class="robot-head">
     <div class="robot-eye left" id="eye-left"></div>
     <div class="robot-eye right" id="eye-right"></div>
     <div class="robot-mouth" id="mouth"></div>
    </div>
    <div class="robot-body">
     <div class="robot-screen">
      <div class="wave-bars">
       <div class="wave-bar" id="bar1"></div>
       <div class="wave-bar" id="bar2"></div>
       <div class="wave-bar" id="bar3"></div>
       <div class="wave-bar" id="bar4"></div>
       <div class="wave-bar" id="bar5"></div>
      </div>
     </div>
    </div>
   </div>
   <div class="flex flex-col items-center gap-6 w-full px-4">
    <div class="w-full max-w-600px">
     <div class="flex gap-2 mb-4"><input type="text" id="search-input" placeholder="Qidiruv..." class="flex-1 input-text" style="max-width:none;"> <button onclick="filterLessons()" class="btn-speak" style="padding:12px 16px;"> <i data-lucide="search" style="width:16px;height:16px;display:inline-block;"></i> </button>
     </div>
     <div id="lessons-list" class="grid gap-2" style="max-height:300px;overflow-y:auto;background:#0a0a0a;padding:12px;border-radius:10px;border:2px solid #0f5;"></div>
    </div>
    <div class="flex flex-col items-center gap-4"><input type="text" class="input-text" id="text-input" placeholder="Matn kiriting yoki darslik tanlang..." value="Salom, men robotman!">
     <div class="flex gap-3 flex-wrap justify-center">
      <button class="btn-speak" id="btn-speak" onclick="speakText()"> <i data-lucide="volume-2" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:6px;"></i> Gapirtirish </button> <button class="btn-speak" id="btn-stop" onclick="stopSpeaking()" style="background:linear-gradient(135deg,#1f2937,#111827);"> <i data-lucide="square" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:6px;"></i> To'xtatish </button>
     </div>
    </div>
   </div>
  </div>
  <script>
        // Database
        const lessons = [
            { id: 1, number: '01', name: '1', url: 'https://www.dropbox.com/scl/fi/l4t5esnzx5fftw8vb96tw/1.mp3?rlkey=mh4ohwg1qnhipjhwu6bol9wcv&st=druxub8j&dl=1' },
            { id: 2, number: '02', name: 'Fizika', url: 'https://www.dropbox.com/scl/fi/abc123/fizika.mp3?rlkey=test&dl=1' },
            { id: 3, number: '03', name: 'Ingliz Tili', url: 'https://www.dropbox.com/scl/fi/xyz789/english.mp3?rlkey=test2&dl=1' },
            { id: 4, number: '04', name: 'Kimyo', url: 'https://www.dropbox.com/scl/fi/qwe456/kimyo.mp3?rlkey=test3&dl=1' },
            { id: 5, number: '05', name: 'Biologiya', url: 'https://www.dropbox.com/scl/fi/asd789/bio.mp3?rlkey=test4&dl=1' },
        ];

        let currentAudio = null;
        let isPlaying = false;
        let audioCtx = null;

        function renderLessonsList() {
            const list = document.getElementById('lessons-list');
            list.innerHTML = lessons.map(lesson => `
                <button class="lesson-btn" onclick="selectLesson(${lesson.id}, '${lesson.name}')">
                    <span>${lesson.number}. ${lesson.name}</span>
                    <i data-lucide="play" style="width:14px;height:14px;"></i>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function selectLesson(id, name) {
            const lesson = lessons.find(l => l.id === id);
            if (lesson) {
                document.getElementById('text-input').value = `${lesson.number}. ${lesson.name}`;
                playLesson(lesson.url, name);
            }
        }

        function filterLessons() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const list = document.getElementById('lessons-list');
            const filtered = lessons.filter(l => l.name.toLowerCase().includes(search));
            
            list.innerHTML = filtered.map(lesson => `
                <button class="lesson-btn" onclick="selectLesson(${lesson.id}, '${lesson.name}')">
                    <span>${lesson.number}. ${lesson.name}</span>
                    <i data-lucide="play" style="width:14px;height:14px;"></i>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function playLesson(url, lessonName) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            isPlaying = true;
            const bubble = document.getElementById('speech-bubble');
            bubble.textContent = `▶ ${lessonName}`;
            bubble.classList.add('visible');

            startAnimation();

            // Try to play audio from Dropbox
            currentAudio = new Audio(url);
            currentAudio.crossOrigin = 'anonymous';
            
            currentAudio.onerror = () => {
                console.error('Darslik yuklanmadi:', url);
                bubble.textContent = `❌ Darslik yuklanmadi`;
                speakSynthetic(`${lessonName} darslik yuklanmadi`);
            };

            currentAudio.onended = () => {
                stopSpeaking();
            };

            currentAudio.play().catch(err => {
                console.error('Audio play error:', err);
                speakSynthetic(`${lessonName} darslik`);
            });
        }

        function speakSynthetic(text) {
            const ctx = getAudioContext();
            const chars = text.replace(/\s+/g, ' ').split('');
            const phonemeDuration = 0.12;
            const pauseDuration = 0.08;
            let currentTime = ctx.currentTime + 0.05;

            chars.forEach((char, i) => {
                if (char === ' ') {
                    currentTime += pauseDuration * 2;
                    return;
                }
                const freq = charToFreq(char);
                const type = 'aeiouAEIOU'.includes(char) ? 'sine' : 'sawtooth';
                playPhoneme(ctx, currentTime, phonemeDuration, freq, type);
                currentTime += phonemeDuration + pauseDuration;
            });

            const totalDuration = (currentTime - ctx.currentTime) * 1000;
            setTimeout(() => stopSpeaking(), totalDuration + 200);
        }

        // Web Audio API based speech synthesizer
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playPhoneme(ctx, startTime, duration, freq, type) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            const filter = ctx.createBiquadFilter();

            osc.type = type || 'sawtooth';
            osc.frequency.setValueAtTime(freq, startTime);
            osc.frequency.linearRampToValueAtTime(freq * 0.9, startTime + duration);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1200, startTime);
            filter.frequency.linearRampToValueAtTime(800, startTime + duration);

            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.15, startTime + 0.02);
            gain.gain.setValueAtTime(0.15, startTime + duration - 0.03);
            gain.gain.linearRampToValueAtTime(0, startTime + duration);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);

            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function charToFreq(char) {
            const vowels = 'aeiouAEIOU';
            const code = char.charCodeAt(0);
            if (vowels.includes(char)) {
                return 180 + (code % 5) * 30;
            }
            return 100 + (code % 10) * 15;
        }

        function speakText() {
            const text = document.getElementById('text-input').value.trim();
            if (!text || isPlaying) return;

            isPlaying = true;
            speakSynthetic(text);
        }

        function startAnimation() {
            const mouth = document.getElementById('mouth');
            const bars = [
                document.getElementById('bar1'),
                document.getElementById('bar2'),
                document.getElementById('bar3'),
                document.getElementById('bar4'),
                document.getElementById('bar5')
            ];

            const animationInterval = setInterval(() => {
                if (!isPlaying) {
                    clearInterval(animationInterval);
                    return;
                }
                mouth.classList.toggle('speaking');
                bars.forEach(bar => {
                    bar.style.height = (6 + Math.random() * 24) + 'px';
                });
                if (Math.random() < 0.05) {
                    document.getElementById('eye-left').classList.add('blink');
                    document.getElementById('eye-right').classList.add('blink');
                    setTimeout(() => {
                        document.getElementById('eye-left').classList.remove('blink');
                        document.getElementById('eye-right').classList.remove('blink');
                    }, 150);
                }
            }, 100);
        }

        function stopSpeaking() {
            isPlaying = false;
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            document.getElementById('mouth').classList.remove('speaking');
            document.getElementById('speech-bubble').classList.remove('visible');
            ['bar1','bar2','bar3','bar4','bar5'].forEach(id => {
                document.getElementById(id).style.height = '8px';
            });
        }

        // Element SDK
        const defaultConfig = {
            page_title: "🤖 Darslik Robot",
            header_text: "Darsliklarni o'qing va robot gapirib beradi"
        };

        function applyConfig(config) {
            document.getElementById('page-title').textContent = config.page_title || defaultConfig.page_title;
            document.getElementById('header-text').textContent = config.header_text || defaultConfig.header_text;
        }

        window.elementSdk.init({
            defaultConfig,
            onConfigChange: async (config) => { applyConfig(config); },
            mapToCapabilities: (config) => ({
                recolorables: [],
                borderables: [],
                fontEditable: undefined,
                fontSizeable: undefined
            }),
            mapToEditPanelValues: (config) => new Map([
                ["page_title", config.page_title || defaultConfig.page_title],
                ["header_text", config.header_text || defaultConfig.header_text]
            ])
        });

        renderLessonsList();
        lucide.createIcons();
    </script>
