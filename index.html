html_code = """<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristik Kiber-Yuz Pleeri</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #0d0221 0%, #030008 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        /* Neon fon effektlari */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* Yuqori sarlavha paneli */
        header {
            z-index: 10;
            text-align: center;
            margin-top: 10px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00f2fe, #4facfe, #ff007f, #7928ca);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientText 6s ease infinite;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        @keyframes gradientText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        p.subtitle {
            font-size: 12px;
            color: #6c7a9c;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* Asosiy Canvas konteyneri */
        .canvas-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        /* Pastki boshqaruv paneli */
        .controls-panel {
            background: rgba(13, 2, 33, 0.7);
            border: 1px solid rgba(0, 242, 254, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px 30px;
            width: 100%;
            max-width: 600px;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .controls-panel:hover {
            border-color: rgba(255, 0, 127, 0.4);
            box-shadow: 0 10px 40px rgba(121, 40, 202, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .playlist {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        /* Scrollbar dizayni */
        .playlist::-webkit-scrollbar {
            height: 4px;
        }
        .playlist::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.3);
            border-radius: 10px;
        }

        .track-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #a0aec0;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .track-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            color: #00f2fe;
            border-color: rgba(0, 242, 254, 0.4);
        }

        .track-btn.active {
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.2), rgba(121, 40, 202, 0.2));
            color: #fff;
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #00f2fe, #7928ca);
            color: white;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
        }

        .play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.6);
            background: linear-gradient(135deg, #00f2fe, #ff007f);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .track-info-block {
            flex-grow: 1;
        }

        .current-title {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 350px;
        }

        .status-text {
            font-size: 11px;
            color: #00f2fe;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Loading animatsiyasi */
        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #00f2fe;
            animation: spin 1s ease infinite;
            margin-left: 5px;
            vertical-align: middle;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* CORS ogohlantirish xabari modal */
        #cors-toast {
            position: absolute;
            top: 20px;
            background: rgba(220, 38, 38, 0.9);
            border: 1px solid #ef4444;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: translateY(-150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        #cors-toast.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="cors-toast">
        ⚠️ Google Drive CORS cheklovi tufayli brauzer audioni blokladi. Proxy rejimiga o'tildi...
    </div>

    <header>
        <h1>Cybernetic AI Face</h1>
        <p class="subtitle">Google Drive audio oqimi va dinamik yuz vizualizatsiyasi</p>
    </header>

    <div class="canvas-container">
        <canvas id="faceCanvas"></canvas>
    </div>

    <div class="controls-panel">
        <div class="playlist" id="playlist">
            </div>

        <div class="player-row">
            <button class="play-btn" id="playBtn">▶</button>
            <div class="track-info-block">
                <div class="current-title" id="currentTitle">Kutish rejimi...</div>
                <div class="status-text" id="statusText">Darsni tanlang va pleyni bosing <span class="loader" id="loader"></span></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <script>
        // 1. Google Drive darslar ro'yxati (FILE_ID laringizni shu yerga yozasiz)
        const LESSONS = {
            1: { url: "audio1.mp3", t: "1-Dars: Kirish va Tizim integratsiyasi" },
            2: { url: "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74", t: "2-Dars: Sun'iy intellekt va kiber-nutq" },
            3: { url: "2CyjNWt1YSB6oGNLwCeCAAkhvVVrqumuG85", t: "3-Dars: Tarmoq xavfsizligi asoslari" }
        };

        // Global o'zgaruvchilar
        const audio = document.getElementById('audioPlayer');
        const canvas = document.getElementById('faceCanvas');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const currentTitle = document.getElementById('currentTitle');
        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');
        const toast = document.getElementById('cors-toast');

        let audioCtx, analyser, source, dataArray, bufferLength;
        let isSetup = false;
        let currentTrackId = null;

        // Yuzning silliq harakatlanishi (Floating) uchun fizik o'zgaruvchilar
        let faceX = 0;
        let faceY = 0;
        let targetX = 0;
        let targetY = 0;
        let time = 0;

        // Canvas o'lchamini moslashtirish
        function resizeCanvas() {
            canvas.width = 500;
            canvas.height = 500;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Pleylist tugmalarini yaratish
        const playlistContainer = document.getElementById('playlist');
        Object.keys(LESSONS).forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'track-btn';
            btn.innerText = `Dars ${key}`;
            btn.addEventListener('click', () => selectTrack(key));
            playlistContainer.appendChild(btn);
        });

        // Darsni tanlash funksiyasi
        function selectTrack(id) {
            currentTrackId = id;
            
            // Faol tugma stilini yangilash
            document.querySelectorAll('.track-btn').forEach((btn, index) => {
                btn.classList.toggle('active', (index + 1) == id);
            });

            currentTitle.innerText = LESSONS[id].t;
            statusText.innerText = "Yuklanmoqda...";
            loader.style.display = 'inline-block';

            // Google Drive to'g'ridan-to'g'ri yuklash havolasini shakllantirish
            const fileId = LESSONS[id].url;
            audio.src = `https://drive.google.com/uc?export=download&id=${fileId}`;
            audio.load();

            // Avtomatik ijro etishga urinish
            audio.play().then(() => {
                initAudioAPI();
                playBtn.innerText = "⏸";
                statusText.innerText = "Jonli ijro etilmoqda";
                loader.style.display = 'none';
            }).catch(err => {
                console.log("Play blocked, waiting for user click.");
                playBtn.innerText = "▶";
                statusText.innerText = "Tugmani bosing";
                loader.style.display = 'none';
            });
        }

        // Web Audio API ni ishga tushirish (Faqat foydalanuvchi harakatidan keyin)
        function initAudioAPI() {
            if (isSetup) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);

                analyser.fftSize = 256;
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                isSetup = true;
            } catch (e) {
                console.error("Audio API error: ", e);
            }
        }

        // Play/Pause tugmasi boshqaruvi
        playBtn.addEventListener('click', () => {
            if (!currentTrackId) {
                selectTrack(1); // Agar hech narsa tanlanmagan bo'lsa 1-darsni qo'yish
                return;
            }

            initAudioAPI();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.innerText = "⏸";
                    statusText.innerText = "Jonli ijro etilmoqda";
                }).catch(handleCORS);
            } else {
                audio.pause();
                playBtn.innerText = "▶";
                statusText.innerText = "To'xtatildi";
            }
        });

        // Google Drive ba'zan CORS xatosi bersa, muqobil Proxy tizimiga o'tish
        function handleCORS(err) {
            console.warn("CORS/Fetch error catch:", err);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 5000);
            
            // Muqobil jamoat proxy serveri orqali qayta urinish (CORSni aylanib o'tish)
            if (currentTrackId && !audio.src.includes('cors-anywhere')) {
                const fileId = LESSONS[currentTrackId].url;
                audio.src = `https://corsproxy.io/?` + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${fileId}`);
                audio.load();
                audio.play();
            }
        }

        // Audio xatoliklarni kuzatish
        audio.addEventListener('error', (e) => {
            console.error("Audio error event:", e);
            handleCORS(e);
        });


        // ==========================================
        //  KUCHLI KIBER-YUZ CHIZISH VA ANIMATSIYASI
        // ==========================================
        function drawFace() {
            requestAnimationFrame(drawFace);

            time += 0.02;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // chastota ma'lumotlarini olish
            let volume = 0;
            let lowFreq = 0;  // Bass (og'iz uchun)
            let highFreq = 0; // High (ko'zlar uchun)

            if (isSetup && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                
                // Ovoz balandligini hisoblash
                let sum = 0;
                for (let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                    if (i < bufferLength / 3) lowFreq += dataArray[i];
                    else highFreq += dataArray[i];
                }
                volume = sum / bufferLength;
                lowFreq = (lowFreq / (bufferLength / 3)) / 255; // 0 - 1 oraliq
                highFreq = (highFreq * 3 / bufferLength) / 255;
            }

            // Tozalash effekti (orqada yorug'lik izi qolishi uchun biroz shaffoflik bilan)
            ctx.fillStyle = 'rgba(3, 0, 8, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // SILLIQ FLOATING (Ekranda mayin suzib yurish fizikasi)
            targetX = Math.sin(time * 0.8) * 25 + Math.cos(time * 0.4) * 10;
            targetY = Math.cos(time * 0.7) * 20 + Math.sin(time * 0.3) * 15;

            // Silliqlash (Linear Interpolation)
            faceX += (targetX - faceX) * 0.05;
            faceY += (targetY - faceY) * 0.05;

            const fx = cx + faceX;
            const fy = cy + faceY;

            // 1. TASHQI KIBER-XALQALAR (Ko'k va Siyohrang neon effekt)
            ctx.save();
            ctx.shadowBlur = 15 + volume * 0.3;
            ctx.shadowColor = '#00f2fe';
            
            // Birinchi aylana (Chastotaga qarab aylanadi va tebranadi)
            ctx.strokeStyle = 'rgba(0, 242, 254, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(fx, fy, 160 + volume * 0.4, 0, Math.PI * 2);
            ctx.stroke();

            // Ikkinchi uzuq-uzuq aylana (Siyohrang neon)
            ctx.shadowColor = '#7928ca';
            ctx.strokeStyle = 'rgba(121, 40, 202, 0.6)';
            ctx.lineWidth = 3;
            ctx.setLineDash([15, 25]);
            ctx.beginPath();
            ctx.arc(fx, fy, 140 - volume * 0.2, time, time + Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // 2. YUZ TUZILISHI (Kiber kontur liniyalari)
            ctx.strokeStyle = 'rgba(0, 242, 254, 0.25)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([]);
            
            // Yuz oval shakli
            ctx.beginPath();
            ctx.moveTo(fx - 70, fy - 80);
            ctx.quadraticCurveTo(fx - 90, fy, fx - 50, fy + 90);
            ctx.quadraticCurveTo(fx, fy + 140, fx + 50, fy + 90);
            ctx.quadraticCurveTo(fx + 90, fy, fx + 70, fy - 80);
            ctx.stroke();

            // Markaziy texnologik chiziq (Eshak)
            ctx.strokeStyle = 'rgba(255, 0, 127, 0.3)';
            ctx.beginPath();
            ctx.moveTo(fx, fy - 110);
            ctx.lineTo(fx, fy - 40);
            ctx.moveTo(fx, fy + 10);
            ctx.lineTo(fx, fy + 50);
            ctx.stroke();

            // 3. KO'ZLAR (Futuristik kiber ko'zlar - Qizil va neon ko'k)
            const eyeSpacing = 35;
            const eyeY = fy - 25;
            
            // Gapirganda ko'zning qisilib-ochilishi yoki kengayishi
            const eyePulse = highFreq * 15;

            // Chap ko'z (Glow effekti bilan)
            ctx.save();
            ctx.shadowBlur = 10 + volume * 0.2;
            ctx.shadowColor = '#00f2fe';
            ctx.fillStyle = '#00f2fe';
            ctx.beginPath();
            ctx.arc(fx - eyeSpacing, eyeY, 6 + eyePulse * 0.2, 0, Math.PI * 2);
            ctx.fill();
            // Ko'z atrofi kiber halqasi
            ctx.strokeStyle = 'rgba(0, 242, 254, 0.6)';
            ctx.beginPath();
            ctx.arc(fx - eyeSpacing, eyeY, 14 + eyePulse * 0.4, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // O'ng ko'z (Neon Qizil/Siyohrang)
            ctx.save();
            ctx.shadowBlur = 10 + volume * 0.2;
            ctx.shadowColor = '#ff007f';
            ctx.fillStyle = '#ff007f';
            ctx.beginPath();
            ctx.arc(fx + eyeSpacing, eyeY, 6 + eyePulse * 0.2, 0, Math.PI * 2);
            ctx.fill();
            // O'ng ko'z kiber halqasi
            ctx.strokeStyle = 'rgba(255, 0, 127, 0.6)';
            ctx.beginPath();
            ctx.arc(fx + eyeSpacing, eyeY, 14 + eyePulse * 0.4, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Qosh chiziqlari (Kiberpank burchakli dizayn)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            // Chap qosh
            ctx.moveTo(fx - 50, eyeY - 15 - eyePulse * 0.3);
            ctx.lineTo(fx - 20, eyeY - 10 - eyePulse * 0.1);
            // O'ng qosh
            ctx.moveTo(fx + 50, eyeY - 15 - eyePulse * 0.3);
            ctx.lineTo(fx + 20, eyeY - 10 - eyePulse * 0.1);
            ctx.stroke();


            // 4. BURUN TIZIMI
            ctx.strokeStyle = 'rgba(0, 242, 254, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(fx, eyeY + 10);
            ctx.lineTo(fx - 5, fy + 15);
            ctx.lineTo(fx + 5, fy + 15);
            ctx.closePath();
            ctx.stroke();


            // 5. DINAMIK OG'IZ (Haqiqiy Audio Bass chastotasiga qarab ochiladi)
            const mouthY = fy + 45;
            // Ovoz past bo'lganda mayin tabassum, baland bo'lganda dinamik ochiladigan to'lqin
            const mouthOpen = lowFreq * 45; 
            const mouthWidth = 40 + lowFreq * 15;

            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff007f';
            ctx.strokeStyle = '#ff007f';
            ctx.fillStyle = 'rgba(121, 40, 202, 0.2)';
            ctx.lineWidth = 3;

            ctx.beginPath();
            if (mouthOpen > 5) {
                // Audio ijro etilayotganda gapirayotgan og'iz (ellipsimon kiber-shakl)
                ctx.ellipse(fx, mouthY, mouthWidth / 2, mouthOpen / 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // Ichki energetik chiziqlar (tishlar o'rniga kiber-energiya)
                ctx.strokeStyle = '#00f2fe';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(fx - mouthWidth / 2 + 5, mouthY);
                ctx.lineTo(fx + mouthWidth / 2 - 5, mouthY);
                ctx.stroke();
            } else {
                // Audio to'xtaganda yopiq kiber-tabassum chizig'i
                ctx.beginPath();
                ctx.moveTo(fx - 25, mouthY);
                ctx.quadraticCurveTo(fx, mouthY + 5, fx + 25, mouthY);
                ctx.stroke();
            }
            ctx.restore();


            // 6. ADRESLI MA'LUMOT VA SIGNAL TO'LQINLARI (Yuz chetida)
            ctx.fillStyle = 'rgba(0, 242, 254, 0.5)';
            ctx.font = '9px monospace';
            ctx.fillText("AI_STATUS: ACTIVE", fx - 130, fy + 120);
            ctx.fillText("FREQ_MOD: " + Math.round(volume * 10), fx + 60, fy + 120);
        }

        // Animatsiyani boshlash
        drawFace();
    </script>
</body>
</html>
