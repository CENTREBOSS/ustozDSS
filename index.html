<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberAcademy — Xavfsizlik Maktabi</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
/* =============================================
   CYBER//ACADEMY — STYLESHEET
   Renkler: Siyohrang, Qizil, Ko'k
   ============================================= */

:root {
  --ink: #0a0f2e;
  --ink-deep: #04061a;
  --ink-mid: #111a3e;
  --ink-light: #1a2555;
  --red: #ff1a3c;
  --red-dim: #cc0022;
  --red-glow: rgba(255, 26, 60, 0.4);
  --blue: #00aaff;
  --blue-bright: #00e5ff;
  --blue-dim: #0066cc;
  --blue-glow: rgba(0, 170, 255, 0.35);
  --text-main: #c8e6ff;
  --text-dim: #6688aa;
  --text-bright: #ffffff;
  --border: rgba(0, 170, 255, 0.2);
  --border-bright: rgba(0, 170, 255, 0.5);
  --gold: #ffd700;
  --green: #00ff88;
  --purple: #8800ff;
}

/* ---- RESET ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--ink-deep);
  color: var(--text-main);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ---- MATRIX CANVAS ---- */
#matrix-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  opacity: 0.12;
  pointer-events: none;
}

/* ---- SCANLINES ---- */
.scanlines {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 170, 255, 0.03) 2px,
    rgba(0, 170, 255, 0.03) 4px
  );
  animation: scanMove 8s linear infinite;
}
@keyframes scanMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 100px; }
}

/* ---- HEADER ---- */
.site-header {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  background: linear-gradient(90deg, rgba(4,6,26,0.98), rgba(10,15,46,0.95));
  border-bottom: 1px solid var(--border-bright);
  box-shadow: 0 0 30px rgba(0, 170, 255, 0.15), 0 2px 0 var(--red);
  flex-wrap: wrap;
  gap: 12px;
}

.header-left { display: flex; flex-direction: column; }

.logo-glitch {
  font-family: 'Orbitron', monospace;
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--blue-bright);
  text-shadow: 0 0 10px var(--blue), 0 0 30px rgba(0,229,255,0.5);
  letter-spacing: 3px;
  position: relative;
  cursor: default;
  animation: logoGlitch 6s infinite;
}
.logo-glitch::before,
.logo-glitch::after {
  content: attr(data-text);
  position: absolute;
  top: 0; left: 0;
  width: 100%;
}
.logo-glitch::before {
  color: var(--red);
  clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
  animation: glitchTop 5s infinite step-end;
  opacity: 0;
}
.logo-glitch::after {
  color: var(--blue);
  clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
  animation: glitchBot 5s infinite step-end;
  opacity: 0;
}
@keyframes glitchTop {
  0%,94%,100% { opacity: 0; transform: translateX(0); }
  95% { opacity: 0.8; transform: translateX(-4px); }
  97% { opacity: 0.8; transform: translateX(4px); }
}
@keyframes glitchBot {
  0%,91%,100% { opacity: 0; transform: translateX(0); }
  92% { opacity: 0.7; transform: translateX(4px); }
  94% { opacity: 0.7; transform: translateX(-4px); }
}
@keyframes logoGlitch {
  0%,90%,100% { text-shadow: 0 0 10px var(--blue), 0 0 30px rgba(0,229,255,0.5); }
  92% { text-shadow: -3px 0 var(--red), 3px 0 var(--blue-bright); }
  94% { text-shadow: 3px 0 var(--red), -3px 0 var(--blue-bright); }
  96% { text-shadow: 0 0 10px var(--blue), 0 0 30px rgba(0,229,255,0.5); }
}

.tagline {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-top: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}

/* ---- SEARCH ---- */
.search-wrapper {
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(0,20,60,0.8);
  border: 1px solid var(--border-bright);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 0 12px var(--blue-glow);
}
#search-input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-bright);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem;
  padding: 8px 14px;
  width: 240px;
  letter-spacing: 1px;
}
#search-input::placeholder { color: var(--text-dim); }
.search-btn {
  background: var(--blue-dim);
  border: none;
  color: white;
  font-size: 1.1rem;
  padding: 8px 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.search-btn:hover { background: var(--blue); }

.stats-bar {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.78rem;
  color: var(--blue-bright);
  display: flex;
  gap: 8px;
  align-items: center;
}
.sep { color: var(--text-dim); }

/* ---- COLOR LEGEND ---- */
.color-legend {
  position: relative; z-index: 10;
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 8px 28px;
  background: rgba(4,6,26,0.9);
  border-bottom: 1px solid var(--border);
  font-size: 0.78rem;
  flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 6px; color: var(--text-dim); }
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}
.dot-default { background: var(--ink-light); border: 1px solid var(--border-bright); }
.dot-learned { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
.dot-important { background: var(--red); box-shadow: 0 0 6px var(--red); }
.tip {
  margin-left: auto;
  color: var(--gold);
  font-size: 0.72rem;
  opacity: 0.7;
  font-family: 'Share Tech Mono', monospace;
}

/* ---- MAIN LAYOUT ---- */
.main-layout {
  position: relative; z-index: 5;
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 0;
  min-height: calc(100vh - 130px);
}

/* ---- LESSON PANEL ---- */
.lesson-panel {
  padding: 20px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  max-height: calc(100vh - 130px);
}
.lesson-panel::-webkit-scrollbar { width: 4px; }
.lesson-panel::-webkit-scrollbar-thumb { background: var(--blue-dim); border-radius: 2px; }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.panel-header h2 {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: var(--blue-bright);
  letter-spacing: 3px;
  text-shadow: 0 0 8px var(--blue-glow);
}

.blink-cursor {
  animation: blink 1s step-end infinite;
  color: var(--red);
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ---- FILTER TABS ---- */
.filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem;
  padding: 4px 12px;
  border-radius: 2px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.tab:hover { border-color: var(--blue); color: var(--blue); }
.tab.active {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--text-bright);
  box-shadow: 0 0 8px var(--blue-glow);
}

/* ---- LESSON GRID ---- */
.lesson-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 6px;
}

.lesson-btn {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--ink-mid);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  padding: 4px;
  text-align: center;
}
.lesson-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(0,170,255,0.05), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.lesson-btn:hover { border-color: var(--blue-bright); color: var(--blue-bright); transform: scale(1.05); box-shadow: 0 0 12px var(--blue-glow); }
.lesson-btn:hover::before { opacity: 1; }
.lesson-btn.active-playing { border-color: var(--red); color: var(--red); box-shadow: 0 0 16px var(--red-glow); animation: activePlay 1s ease infinite; }
@keyframes activePlay { 0%,100% { box-shadow: 0 0 16px var(--red-glow); } 50% { box-shadow: 0 0 28px var(--red-glow), 0 0 4px var(--red); } }

.lesson-btn .ln { font-size: 0.9rem; font-weight: bold; color: var(--blue-bright); }
.lesson-btn .lt { font-size: 0.6rem; line-height: 1.2; overflow: hidden; max-height: 28px; word-break: break-word; }

/* Color states */
.lesson-btn.state-important { background: rgba(200,0,30,0.12); border-color: var(--red); color: var(--red); }
.lesson-btn.state-important .ln { color: var(--red); }
.lesson-btn.state-learned { background: rgba(0,100,200,0.15); border-color: var(--blue); color: var(--blue-bright); }
.lesson-btn.state-learned .ln { color: var(--blue-bright); }
.lesson-btn.state-done { background: rgba(0,200,100,0.12); border-color: var(--green); color: var(--green); }
.lesson-btn.state-done .ln { color: var(--green); }
.lesson-btn.state-review { background: rgba(255,200,0,0.1); border-color: var(--gold); color: var(--gold); }
.lesson-btn.state-review .ln { color: var(--gold); }

/* ---- HOLOGRAM PANEL ---- */
.hologram-panel {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 10px;
  border-right: 1px solid var(--border);
  background: radial-gradient(ellipse at center, rgba(0,50,120,0.08) 0%, transparent 70%);
  position: sticky;
  top: 0;
  max-height: calc(100vh - 130px);
  overflow: hidden;
}

.holo-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
}

/* RINGS */
.holo-rings {
  position: relative;
  width: 280px;
  height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid;
  animation: ringRotate linear infinite;
}
.ring-1 {
  width: 270px; height: 270px;
  border-color: rgba(0,170,255,0.25);
  animation-duration: 12s;
}
.ring-2 {
  width: 230px; height: 230px;
  border-color: rgba(255,26,60,0.2);
  animation-duration: 8s;
  animation-direction: reverse;
}
.ring-3 {
  width: 190px; height: 190px;
  border-color: rgba(0,229,255,0.15);
  animation-duration: 6s;
}
@keyframes ringRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.ring-1::before, .ring-2::before, .ring-3::before {
  content: '';
  position: absolute;
  top: -3px; left: 50%;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--blue-bright);
  box-shadow: 0 0 8px var(--blue);
}

/* FACE WRAPPER */
.face-wrapper {
  position: absolute;
  width: 220px;
  height: 240px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: faceFloat 4s ease-in-out infinite;
}
@keyframes faceFloat {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

#ai-face {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 20px rgba(0,170,255,0.5)) drop-shadow(0 0 40px rgba(0,100,255,0.2));
}

/* HOLOGRAM SCAN */
.holo-scan {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(0,229,255,0.8), transparent);
  animation: scanDown 3s ease-in-out infinite;
  box-shadow: 0 0 10px rgba(0,229,255,0.6);
  pointer-events: none;
}
@keyframes scanDown {
  0% { top: 0; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

/* AUDIO PLAYER */
.audio-player {
  width: 100%;
  background: rgba(4,6,26,0.9);
  border: 1px solid var(--border-bright);
  border-radius: 6px;
  padding: 12px;
  box-shadow: 0 0 20px var(--blue-glow);
}
.now-playing {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem;
  color: var(--blue-bright);
  text-align: center;
  margin-bottom: 8px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  text-shadow: 0 0 6px var(--blue-glow);
  letter-spacing: 1px;
}
#main-audio {
  width: 100%;
  height: 30px;
  margin-bottom: 8px;
  filter: hue-rotate(180deg) brightness(1.2);
}
/* Override audio chrome */
#main-audio::-webkit-media-controls-panel { background: rgba(0,30,80,0.9); }

/* AUDIO VISUALIZER */
.audio-viz {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 4px;
  height: 32px;
}
.bar {
  width: 8px;
  background: linear-gradient(to top, var(--red), var(--blue));
  border-radius: 2px 2px 0 0;
  height: 4px;
  transition: height 0.08s;
  box-shadow: 0 0 4px var(--blue-glow);
}
.audio-viz.playing .bar { animation: barDance 0.5s ease infinite alternate; }
.bar:nth-child(1) { animation-delay: 0s; }
.bar:nth-child(2) { animation-delay: 0.05s; }
.bar:nth-child(3) { animation-delay: 0.1s; }
.bar:nth-child(4) { animation-delay: 0.15s; }
.bar:nth-child(5) { animation-delay: 0.2s; }
.bar:nth-child(6) { animation-delay: 0.08s; }
.bar:nth-child(7) { animation-delay: 0.13s; }
.bar:nth-child(8) { animation-delay: 0.18s; }
.bar:nth-child(9) { animation-delay: 0.03s; }
.bar:nth-child(10) { animation-delay: 0.22s; }
.bar:nth-child(11) { animation-delay: 0.07s; }
.bar:nth-child(12) { animation-delay: 0.17s; }
@keyframes barDance {
  0% { height: 4px; }
  100% { height: 28px; }
}

/* HOLO STATUS */
.holo-status {
  width: 100%;
  background: rgba(4,6,26,0.7);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 12px;
}
.status-line {
  display: flex;
  justify-content: space-between;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  padding: 3px 0;
  border-bottom: 1px solid rgba(0,100,200,0.1);
}
.status-line:last-child { border-bottom: none; }
.sl-label { color: var(--text-dim); letter-spacing: 1px; }
.sl-val { color: var(--green); text-shadow: 0 0 5px rgba(0,255,100,0.5); }

/* ---- ADMIN PANEL ---- */
.admin-panel {
  padding: 20px 16px;
  background: rgba(4,6,26,0.5);
  overflow-y: auto;
  max-height: calc(100vh - 130px);
}
.admin-panel::-webkit-scrollbar { width: 3px; }
.admin-panel::-webkit-scrollbar-thumb { background: var(--red-dim); }

.toggle-admin {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 2px;
  transition: all 0.2s;
}
.toggle-admin:hover { border-color: var(--blue); color: var(--blue); }

.admin-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}
.admin-form label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-bottom: -4px;
}
.admin-form input,
.admin-form select {
  background: rgba(0,20,60,0.8);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-main);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem;
  padding: 7px 10px;
  outline: none;
  transition: border-color 0.2s;
}
.admin-form input:focus,
.admin-form select:focus { border-color: var(--blue-bright); box-shadow: 0 0 8px var(--blue-glow); }
.admin-form select option { background: var(--ink-deep); }

.add-btn, .export-btn, .import-btn {
  border: none;
  border-radius: 3px;
  padding: 10px;
  font-family: 'Orbitron', monospace;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.add-btn {
  background: linear-gradient(90deg, var(--red-dim), #880022);
  color: white;
  box-shadow: 0 0 12px var(--red-glow);
}
.add-btn:hover { background: linear-gradient(90deg, var(--red), var(--red-dim)); box-shadow: 0 0 20px var(--red-glow); transform: translateY(-1px); }
.export-btn {
  background: linear-gradient(90deg, var(--blue-dim), #004499);
  color: white;
  box-shadow: 0 0 10px var(--blue-glow);
  font-size: 0.62rem;
}
.export-btn:hover { transform: translateY(-1px); box-shadow: 0 0 18px var(--blue-glow); }
.import-btn {
  background: rgba(0,100,200,0.2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.62rem;
}
.import-btn:hover { border-color: var(--blue); color: var(--blue); }

/* ADMIN LIST */
.admin-list h3 {
  font-family: 'Orbitron', monospace;
  font-size: 0.72rem;
  color: var(--blue-bright);
  letter-spacing: 2px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.admin-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(0,100,200,0.08);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
}
.admin-item .ai-num {
  color: var(--blue-bright);
  min-width: 28px;
  font-weight: bold;
}
.admin-item .ai-title {
  color: var(--text-dim);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.admin-item .ai-del {
  background: none;
  border: 1px solid rgba(200,0,30,0.3);
  color: var(--red);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 2px;
  font-size: 0.65rem;
  transition: all 0.2s;
}
.admin-item .ai-del:hover { background: var(--red-dim); color: white; }

/* ---- CONTEXT MENU ---- */
#ctx-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 100;
  background: transparent;
}
.context-menu {
  position: fixed;
  z-index: 101;
  background: var(--ink-deep);
  border: 1px solid var(--border-bright);
  border-radius: 6px;
  padding: 12px;
  box-shadow: 0 0 30px var(--blue-glow), 0 0 60px rgba(0,0,0,0.8);
  min-width: 180px;
  animation: menuPop 0.15s ease;
}
@keyframes menuPop {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.cm-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-align: center;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.cm-btn {
  display: block;
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-main);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.78rem;
  padding: 7px 12px;
  border-radius: 3px;
  cursor: pointer;
  text-align: left;
  margin-bottom: 6px;
  transition: all 0.18s;
  letter-spacing: 1px;
}
.cm-btn:hover { transform: translateX(4px); }
.cm-default:hover { border-color: var(--text-dim); color: var(--text-bright); }
.cm-red:hover { border-color: var(--red); color: var(--red); background: rgba(200,0,30,0.1); }
.cm-blue:hover { border-color: var(--blue); color: var(--blue); background: rgba(0,100,200,0.1); }
.cm-green:hover { border-color: var(--green); color: var(--green); background: rgba(0,200,100,0.1); }

  <script>
/* =============================================
   CYBER//ACADEMY — script.js
   ============================================= */

/* ====================================================
   📂 MA'LUMOTLAR BAZASI
   Yangi dars qo'shish uchun quyidagi ro'yxatga
   quyidagi formatda qator qo'shing:

   { id: RAQAM, title: "DARS NOMI", url: "DROPBOX_LINK" },

   Masalan:
   { id: 11, title: "Phishing hujumlari", url: "https://www.dropbox.com/s/abc123/dars11.mp3?dl=0" },

   ☝️ url: Dropbox share linkini to'liq ko'chiring —
   skript avtomatik to'g'ri formatga o'tkazadi.
   ==================================================== */

const LESSONS = [
  { id: 1,  title: "Kirish",             url: "https://www.dropbox.com/scl/fi/l4t5esnzx5fftw8vb96tw/1.mp3?rlkey=mh4ohwg1qnhipjhwu6bol9wcv&st=a6kbbolm&dl=0"  },
  { id: 2,  title: "Tarmoq asoslari",    url: "https://www.dropbox.com/s/LINK_2/audio.mp3?dl=0"  },
  { id: 3,  title: "Linux CLI",          url: "https://www.dropbox.com/s/LINK_3/audio.mp3?dl=0"  },
  { id: 4,  title: "Nmap skaneri",       url: "https://www.dropbox.com/s/LINK_4/audio.mp3?dl=0"  },
  { id: 5,  title: "SQL Injection",      url: "https://www.dropbox.com/s/LINK_5/audio.mp3?dl=0"  },
  { id: 6,  title: "XSS hujumi",         url: "https://www.dropbox.com/s/LINK_6/audio.mp3?dl=0"  },
  { id: 7,  title: "Metasploit",         url: "https://www.dropbox.com/s/LINK_7/audio.mp3?dl=0"  },
  { id: 8,  title: "Wireshark",          url: "https://www.dropbox.com/s/LINK_8/audio.mp3?dl=0"  },
  { id: 9,  title: "Kriptografiya",      url: "https://www.dropbox.com/s/LINK_9/audio.mp3?dl=0"  },
  { id: 10, title: "CTF — 1-bosqich",    url: "https://www.dropbox.com/s/LINK_10/audio.mp3?dl=0" },
  /* --- YANGI DARSLARNI SHU YERDAN PASTGA QO'SHING --- */
];

/* ====================================================
   ⚙️ QUYIDAGI KODGA TEGMANG
   ==================================================== */

// Runtime state (localStorage orqali saqlanadi — rang belgilash)
let states   = {};   // { lessonId: 'default'|'important'|'learned'|'done'|'review' }
let currentId   = null;
let filterMode  = 'all';
let mouthTimer  = null;
let floatX = 0, floatY = 0, floatVX = 0.35, floatVY = 0.22;
let lastSpeedTs = 0;

// ── INIT ──────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadStates();
  renderGrid();
  updateStats();
  initMatrix();
  initFaceFloat();
  initBlink();
  initSignalFlicker();
  initAudio();
  initLongPress();
  setFooterDate();
});

// ── LOCALSTORAGE ──────────────────────────────────
function loadStates() {
  try { states = JSON.parse(localStorage.getItem('cyStates') || '{}'); } catch { states = {}; }
}
function saveStates() {
  try { localStorage.setItem('cyStates', JSON.stringify(states)); } catch {}
}

// ── RENDER GRID ───────────────────────────────────
function renderGrid(query) {
  const grid = document.getElementById('lesson-grid');
  grid.innerHTML = '';
  const q = (query || '').toLowerCase().trim();

  LESSONS.forEach(lesson => {
    const state  = states[lesson.id] || 'default';
    const matchF = filterMode === 'all'
      || (filterMode === 'learned'   && state === 'learned')
      || (filterMode === 'important' && state === 'important')
      || (filterMode === 'new'       && state === 'default');
    const matchQ = !q || String(lesson.id).includes(q) || lesson.title.toLowerCase().includes(q);

    const btn = document.createElement('div');
    btn.className = `lesson-btn state-${state}${(!matchF || !matchQ) ? ' hidden' : ''}${lesson.id === currentId ? ' active-playing' : ''}`;
    btn.dataset.id  = lesson.id;
    btn.title       = `${lesson.id}. ${lesson.title}`;
    btn.innerHTML   = `<span class="ln">${lesson.id}</span><span class="lt">${lesson.title}</span>`;
    btn.addEventListener('click', () => playLesson(lesson.id));
    grid.appendChild(btn);
  });
}

// ── PLAY ──────────────────────────────────────────
function playLesson(id) {
  const lesson = LESSONS.find(l => l.id === id);
  if (!lesson) return;
  currentId = id;

  const audio      = document.getElementById('main-audio');
  const nowPlaying = document.getElementById('now-playing');

  audio.src = toDirectURL(lesson.url);
  audio.load();
  audio.play().catch(() => {});
  nowPlaying.textContent = `▶ ${lesson.id}. ${lesson.title.toUpperCase()}`;
  renderGrid(document.getElementById('search-input').value);
}

function toDirectURL(url) {
  if (!url) return '';
  // www.dropbox.com  →  dl.dropboxusercontent.com  +  raw=1
  if (url.includes('dropbox.com') && !url.includes('dl.dropboxusercontent.com')) {
    return url
      .replace('www.dropbox.com', 'dl.dropboxusercontent.com')
      .replace(/[?&]dl=\d/, '')
      + (url.includes('?') ? '&raw=1' : '?raw=1');
  }
  return url;
}

// ── AUDIO SYNC ────────────────────────────────────
function initAudio() {
  const audio = document.getElementById('main-audio');
  const viz   = document.getElementById('audio-viz');

  audio.addEventListener('play',  () => { viz.classList.add('playing');    startMouth(); });
  audio.addEventListener('pause', () => { viz.classList.remove('playing'); stopMouth();  });
  audio.addEventListener('ended', () => {
    viz.classList.remove('playing');
    stopMouth();
    document.getElementById('now-playing').textContent = 'Dars tugadi';
    currentId = null;
    renderGrid(document.getElementById('search-input').value);
  });

  // Visualizer bars
  setInterval(() => {
    if (audio.paused) return;
    document.querySelectorAll('.bar').forEach(b => {
      b.style.height = (Math.random() * 26 + 4) + 'px';
    });
  }, 90);
}

// ── MOUTH ─────────────────────────────────────────
function startMouth() {
  if (mouthTimer) clearInterval(mouthTimer);
  mouthTick();
}
function stopMouth() {
  if (mouthTimer) clearInterval(mouthTimer);
  mouthTimer = null;
  setMouth(false);
}
let mouthPhase = 0;
function mouthTick() {
  const audio = document.getElementById('main-audio');
  if (audio.paused) { setMouth(false); return; }
  mouthPhase = (mouthPhase + 1) % 3;
  setMouth(mouthPhase !== 0);
  const delay = Math.random() * 180 + 70;
  mouthTimer = setTimeout(mouthTick, delay);
}
function setMouth(open) {
  const mo = document.getElementById('mouth-open');
  const mt = document.getElementById('teeth');
  const mg = document.getElementById('tongue');
  const mb = document.getElementById('mouth-base');
  if (open) {
    const op = (Math.random() * 0.55 + 0.45).toFixed(2);
    const v  = 148 + Math.random() * 5;
    mo.setAttribute('d',       `M82 ${v} Q100 ${154+Math.random()*5} 118 ${v} Q110 ${160+Math.random()*4} 100 ${163+Math.random()*3} Q90 ${160+Math.random()*4} 82 ${v} Z`);
    mo.setAttribute('opacity', op);
    mt.setAttribute('opacity', (op * 0.9).toFixed(2));
    mg.setAttribute('opacity', (op * 0.4).toFixed(2));
    mb.setAttribute('opacity', '0');
  } else {
    mo.setAttribute('opacity', '0');
    mt.setAttribute('opacity', '0');
    mg.setAttribute('opacity', '0');
    mb.setAttribute('opacity', '0.8');
  }
}

// ── FACE FLOAT ────────────────────────────────────
function initFaceFloat() {
  const face = document.getElementById('face-wrapper');
  const MAX_X = 28, MAX_Y = 22;

  function step(ts) {
    if (ts - lastSpeedTs > 2200 + Math.random() * 2800) {
      floatVX = (Math.random() - 0.5) * 1.4;
      floatVY = (Math.random() - 0.5) * 1.0;
      lastSpeedTs = ts;
    }
    const spd = 0.15 + Math.random() * 0.05;
    floatX += floatVX * spd;
    floatY += floatVY * spd;
    if (floatX > MAX_X || floatX < -MAX_X) { floatVX *= -1; floatX = Math.max(-MAX_X, Math.min(MAX_X, floatX)); }
    if (floatY > MAX_Y || floatY < -MAX_Y) { floatVY *= -1; floatY = Math.max(-MAX_Y, Math.min(MAX_Y, floatY)); }
    face.style.transform = `translate(${floatX.toFixed(2)}px, ${floatY.toFixed(2)}px)`;
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── BLINK ─────────────────────────────────────────
function initBlink() {
  function blink() {
    const ll = document.getElementById('left-eyelid');
    const rl = document.getElementById('right-eyelid');
    if (!ll) return;
    ll.setAttribute('d', 'M58 92 Q72 100 86 92');
    rl.setAttribute('d', 'M114 92 Q128 100 142 92');
    setTimeout(() => {
      ll.setAttribute('d', 'M58 92 Q72 82 86 92');
      rl.setAttribute('d', 'M114 92 Q128 82 142 92');
    }, 130);
    setTimeout(blink, 2200 + Math.random() * 3800);
  }
  setTimeout(blink, 1800);
}

// ── SIGNAL FLICKER ────────────────────────────────
function initSignalFlicker() {
  setInterval(() => {
    const el = document.getElementById('signal-val');
    if (el) el.textContent = (95 + Math.floor(Math.random() * 5)) + '%';
  }, 2800);
}

// ── SEARCH ───────────────────────────────────────
function searchLessons() {
  renderGrid(document.getElementById('search-input').value);
}
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('search-input');
  inp.addEventListener('input',  () => renderGrid(inp.value));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') renderGrid(inp.value); });
});

// ── FILTER ───────────────────────────────────────
function filterLessons(state, btnEl) {
  filterMode = state;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  renderGrid(document.getElementById('search-input').value);
}

// ── LONG PRESS → COLOR MENU ───────────────────────
let pressTimer   = null;
let ctxTargetId  = null;

function initLongPress() {
  const grid = document.getElementById('lesson-grid');

  function start(x, y, id) {
    ctxTargetId = id;
    pressTimer = setTimeout(() => openCtxMenu(x, y), 580);
  }
  function cancel() { clearTimeout(pressTimer); }

  grid.addEventListener('mousedown', e => {
    const btn = e.target.closest('.lesson-btn');
    if (btn) start(e.clientX, e.clientY, +btn.dataset.id);
  });
  grid.addEventListener('mouseup',    cancel);
  grid.addEventListener('mouseleave', cancel);
  grid.addEventListener('touchstart', e => {
    const btn = e.target.closest('.lesson-btn');
    if (!btn) return;
    const t = e.touches[0];
    start(t.clientX, t.clientY, +btn.dataset.id);
  }, { passive: true });
  grid.addEventListener('touchend',   cancel);
}

function openCtxMenu(x, y) {
  const menu = document.getElementById('context-menu');
  const ov   = document.getElementById('ctx-overlay');
  menu.style.display = 'block';
  ov.style.display   = 'block';
  const l = Math.min(x, window.innerWidth  - 200);
  const t = Math.min(y, window.innerHeight - 260);
  menu.style.left = l + 'px';
  menu.style.top  = t + 'px';
}
function closeContextMenu() {
  document.getElementById('context-menu').style.display = 'none';
  document.getElementById('ctx-overlay').style.display  = 'none';
  ctxTargetId = null;
}
function setLessonColor(state) {
  if (ctxTargetId == null) return;
  states[ctxTargetId] = state;
  saveStates();
  updateStats();
  renderGrid(document.getElementById('search-input').value);
  closeContextMenu();
}

// ── STATS ─────────────────────────────────────────
function updateStats() {
  document.getElementById('total-count').textContent   = LESSONS.length + ' dars';
  const done = LESSONS.filter(l => ['learned','done'].includes(states[l.id])).length;
  document.getElementById('marked-count').textContent  = done + " o'rganildi";
}

// ── FOOTER DATE ───────────────────────────────────
function setFooterDate() {
  const el = document.getElementById('footer-date');
  if (el) el.textContent = new Date().toLocaleDateString('uz-UZ', { year: 'numeric', month: 'long', day: 'numeric' });
}

// ── MATRIX RAIN ───────────────────────────────────
function initMatrix() {
  const canvas = document.getElementById('matrix-canvas');
  const ctx    = canvas.getContext('2d');
  const CHARS  = '01アイウエオカキクケサシスセタチツテナニABCDEF<>{}|!@#$%^';
  const FS     = 13;
  let drops    = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    drops = Array(Math.floor(canvas.width / FS)).fill(1);
  }
  resize();
  window.addEventListener('resize', resize);

  setInterval(() => {
    ctx.fillStyle = 'rgba(4,6,26,0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = FS + 'px "Share Tech Mono", monospace';
    drops.forEach((y, i) => {
      ctx.fillStyle = i % 7 === 0 ? '#ff1a3c' : '#00aaff';
      ctx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], i * FS, y * FS);
      if (y * FS > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }, 55);
}
  </script>
